services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      # Writable SQLite path inside the container (override host .env if needed)
      DATABASE_URL: file:/app/data/prod.db
    volumes:
      - summarizer-data:/app/data
    restart: unless-stopped

volumes:
  summarizer-data:
