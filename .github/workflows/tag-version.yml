# Tags v* from package.json (or manual input); creates the Release here because GITHUB_TOKEN pushes do not trigger release.yml.
name: Tag version

on:
  push:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
      - ".github/workflows/tag-version.yml"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver to tag (e.g. 0.29.1). Leave empty to use package.json version."
        required: false
        type: string

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve version
        id: ver
        run: |
          V="${{ github.event.inputs.version }}"
          [ -z "$V" ] && V=$(node -p "require('./package.json').version")
          V="${V#v}" # strip leading v
          { echo "version=$V"; echo "tag=v${V}"; } >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "Tag ${TAG} already exists on remote; skipping."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
