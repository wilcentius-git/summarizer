# Creates an annotated git tag vX.Y.Z from package.json when the version changes on main.
# Pushing the tag triggers release.yml, which publishes a GitHub Release.
name: Tag version

on:
  push:
    branches: [main]
    paths:
      - package.json
  workflow_dispatch:
    inputs:
      version:
        description: "Semver to tag (e.g. 0.25.1). Leave empty to use package.json version."
        required: false
        type: string

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve version
        id: ver
        run: |
          MANUAL="${{ github.event.inputs.version }}"
          if [ -n "$MANUAL" ]; then
            V="$MANUAL"
          else
            V=$(node -p "require('./package.json').version")
          fi
          # strip leading v if someone typed v1.2.3
          V="${V#v}"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v${V}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          set -e
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q .; then
            echo "Tag ${TAG} already exists on remote; skipping."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
